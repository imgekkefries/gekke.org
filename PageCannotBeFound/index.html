<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="author" content="gekkefries">
  <title>Page Cannot Be Found ~ gekke.org</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }
    :root {
      --bg: #080a0e;
      --card: rgba(10, 13, 18, 0.5);
      --t1: #f0f3f8;
      --t2: #b9c2d4;
      --t3: #7e8a98;
      --acc: #5865F2;
      --ease: cubic-bezier(0.23, 1, 0.32, 1);
      --mono: 'Terminal', 'SF Mono', 'Fira Code', 'Courier New', monospace;
      --glow1: rgba(210, 230, 255, 0.04);
      --glow2: rgba(255, 245, 240, 0.025);
    }
    @font-face {
      font-family: 'Terminal';
      src: url('https://imgekkefries.pythonanywhere.com/terminal.woff') format('woff');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
    body {
      background: var(--bg);
      font-family: var(--mono);
      height: 100vh;
      width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    .grid {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 15px), linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 50px 50px, 40px 40px, 40px 40px;
      pointer-events: none;
      z-index: 1;
    }
    .glow {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 30%, var(--glow1) 0%, transparent 50%), radial-gradient(circle at 80% 70%, var(--glow2) 0%, transparent 50%);
      pointer-events: none;
      z-index: 1;
    }
    .diag {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(45deg, rgba(255,255,255,0.003) 0px, rgba(255,255,255,0.003) 1px, transparent 1px, transparent 10px);
      pointer-events: none;
      z-index: 1;
    }
    .txt {
      position: fixed;
      top: -5%;
      left: -5%;
      width: 110%;
      height: 110%;
      pointer-events: none;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(16, 1fr);
      grid-template-rows: repeat(20, 1fr);
      gap: 0.3rem;
      transform: rotate(-4deg);
      opacity: 0.4;
      font-family: var(--mono);
      text-transform: uppercase;
      font-size: clamp(0.6rem, 1.5vw, 0.95rem);
      font-weight: 400;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.12);
      padding: 1.5rem;
    }
    .txt div {
      display: flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      text-shadow: 0 0 2px rgba(255,255,255,0.08);
    }
    .txt div:nth-child(3n) { opacity: 0.7; }
    .txt div:nth-child(5n) { transform: rotate(1deg); }
    .txt div:nth-child(7n) { transform: rotate(-1deg); }
    .nf {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 64px;
      animation: fi 0.6s var(--ease) forwards;
    }
    @keyframes fi {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .num {
      font-size: 180px;
      font-weight: 500;
      line-height: 1;
      letter-spacing: -0.04em;
      color: var(--t1);
      margin-bottom: 24px;
    }
    .sep {
      width: 50px;
      height: 2px;
      background: var(--acc);
      margin: 0 auto 36px;
      border-radius: 1px;
      animation: ex 0.5s var(--ease) 0.2s forwards;
      transform-origin: center;
      transform: scaleX(0);
    }
    @keyframes ex {
      0% { transform: scaleX(0); }
      100% { transform: scaleX(1); }
    }
    .h {
      font-size: 36px;
      font-weight: 500;
      letter-spacing: -0.03em;
      color: var(--t1);
      margin-bottom: 16px;
    }
    .p {
      font-size: 18px;
      line-height: 1.6;
      font-weight: 400;
      color: var(--t2);
      letter-spacing: -0.01em;
      margin-bottom: 48px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-family: var(--mono);
      font-size: 16px;
      font-weight: 500;
      color: var(--t2);
      text-decoration: none;
      letter-spacing: -0.01em;
      transition: all 0.3s var(--ease);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
    }
    .btn:hover {
      gap: 20px;
      color: var(--t1);
    }
    .btn svg {
      width: 20px;
      height: 20px;
      transition: transform 0.3s var(--ease);
    }
    .btn:hover svg {
      transform: translateX(-4px);
    }
    @media (max-width: 750px) {
      .num { font-size: 100px; }
      .h { font-size: 28px; }
      .p { font-size: 16px; margin-bottom: 36px; }
      .nf { padding: 40px; }
      .btn { font-size: 14px; }
      .sep { width: 40px; margin-bottom: 28px; }
    }
  </style>
</head>
<body>
  <div class="grid"></div>
  <div class="glow"></div>
  <div class="diag"></div>
  <div class="txt" id="t"></div>
  <div class="nf">
    <div class="num">404</div>
    <div class="sep"></div>
    <div class="h">Page cannot be found</div>
    <div class="p">The page you're looking for doesn't exist or has been moved.</div>
    <button class="btn" id="b">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M19 12H5M5 12L12 19M5 12L12 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Back to home
    </button>
  </div>
  <script>
    (function() {
      var g = document.getElementById('t');
      if (g) {
        function r() {
          g.innerHTML = '';
          var w = window.innerWidth;
          var c = 16, ro = 20;
          if (w < 768) { c = 10; ro = 15; }
          else if (w > 1600) { c = 20; ro = 24; }
          g.style.gridTemplateColumns = 'repeat(' + c + ', 1fr)';
          g.style.gridTemplateRows = 'repeat(' + ro + ', 1fr)';
          for (var i = 0; i < c * ro; i++) {
            var d = document.createElement('div');
            d.textContent = 'gekke.org';
            g.appendChild(d);
          }
        }
        r();
        window.addEventListener('resize', function() {
          setTimeout(r, 100);
        });
      }
    })();
  </script>
  <script>
    (function() {
      var btn = document.getElementById('b');
      if (btn) {
        btn.addEventListener('click', function() {
          var url = window.location.href;
          var ls = url.lastIndexOf('/');
          var base = url.substring(0, ls);
          if (base.endsWith('/Templates')) base = base.substring(0, base.lastIndexOf('/'));
          if (!base.endsWith('/')) base += '/';
          window.location.href = base + 'index.html';
        });
      }
    })();
  </script>
</body>
</html>
