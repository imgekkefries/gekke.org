<head>

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    @font-face {
      font-family: 'Terminal';
      src: url('https://imgekkefries.pythonanywhere.com/terminal.woff') format('woff');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #10131a;
      --card-bg: rgba(14, 17, 22, 0.7);
      --card-border: rgba(255, 255, 255, 0.08);
      --t1: #f0f3f8;
      --t2: #b9c2d4;
      --t3: #7e8a98;
      --acc: #5865F2;
      --price-color: #c7d2e0;
      --optional-badge: #8b7e6a;
      --ease: cubic-bezier(0.23, 1, 0.32, 1);
      --mono: 'Terminal', 'SF Mono', 'Fira Code', 'Courier New', monospace;
      --glow1: rgba(210, 230, 255, 0.05);
      --glow2: rgba(255, 245, 240, 0.035);
    }

    body {
      background: var(--bg);
      font-family: var(--mono);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow-x: hidden;
      position: relative;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      padding: 0 0 60px;
    }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; margin: 4px 0; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }
    ::-webkit-scrollbar-corner { background: transparent; }
    * { scrollbar-width: thin; scrollbar-color: rgba(255, 255, 255, 0.1) transparent; }

    .grid {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.018) 0px, rgba(255,255,255,0.018) 1px, transparent 1px, transparent 18px), linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 55px 55px, 42px 42px, 42px 42px;
      pointer-events: none; z-index: 0;
    }
    .glow {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 20% 30%, var(--glow1) 0%, transparent 55%), radial-gradient(circle at 80% 70%, var(--glow2) 0%, transparent 55%);
      pointer-events: none; z-index: 0;
    }
    .diag {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: repeating-linear-gradient(45deg, rgba(255,255,255,0.004) 0px, rgba(255,255,255,0.004) 1px, transparent 1px, transparent 12px);
      pointer-events: none; z-index: 0;
    }
    .txt {
      position: fixed; top: -5%; left: -5%; width: 110%; height: 110%; pointer-events: none; z-index: 0;
      display: grid; grid-template-columns: repeat(16, 1fr); grid-template-rows: repeat(20, 1fr);
      gap: 0.3rem; transform: rotate(-4deg); opacity: 0.35;
      font-family: var(--mono); text-transform: uppercase;
      font-size: clamp(0.6rem, 1.5vw, 0.95rem); font-weight: 400;
      letter-spacing: 0.15em; color: rgba(255,255,255,0.14); padding: 1.5rem;
    }
    .txt div { display: flex; align-items: center; justify-content: center; white-space: nowrap; text-shadow: 0 0 2px rgba(255,255,255,0.1); }
    .txt div:nth-child(3n) { opacity: 0.7; }
    .txt div:nth-child(5n) { transform: rotate(1deg); }
    .txt div:nth-child(7n) { transform: rotate(-1deg); }

    .topbar {
      position: fixed; top: 0; left: 0; width: 100%; height: clamp(54px, 7.5vh, 74px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 clamp(20px, 4vw, 48px); z-index: 100;
      background: rgba(16, 19, 26, 0.8); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .topbar-left { display: flex; align-items: center; gap: clamp(12px, 1.8vw, 18px); }
    .topbar-logo { height: clamp(34px, 4.8vw, 46px); width: auto; display: block; border-radius: 6px; }
    .topbar-brand { font-size: clamp(14px, 1.6vw, 17px); color: rgba(255,255,255,0.75); letter-spacing: 0.5px; font-weight: 400; }

    .page {
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
      padding: 120px 24px 40px;
      z-index: 5;
      position: relative;
      animation: fadeUp 0.6s var(--ease) forwards;
    }
    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .page-title {
      font-size: clamp(28px, 4vw, 42px);
      color: var(--t1);
      margin-bottom: 8px;
      font-weight: 400;
      letter-spacing: 0.5px;
    }
    .page-subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 24px;
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding-bottom: 24px;
    }
    .total-section {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-left: auto;
    }
    .optional-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 12px;
      color: var(--t3);
      letter-spacing: 0.3px;
      user-select: none;
      transition: color 0.2s ease;
    }
    .optional-toggle:hover {
      color: var(--t2);
    }
    .optional-toggle input[type="checkbox"] {
      display: none;
    }
    .toggle-box {
      width: 36px;
      height: 20px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      position: relative;
      transition: all 0.3s var(--ease);
      flex-shrink: 0;
    }
    .toggle-box::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      background: var(--t3);
      border-radius: 50%;
      transition: all 0.3s var(--ease);
    }
    .optional-toggle input:checked + .toggle-box {
      background: rgba(88, 101, 242, 0.2);
      border-color: rgba(88, 101, 242, 0.4);
    }
    .optional-toggle input:checked + .toggle-box::after {
      left: 18px;
      background: #fff;
    }
    .total-cost {
      font-size: 15px;
      color: var(--price-color);
      background: rgba(255,255,255,0.04);
      padding: 6px 16px;
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.1);
      letter-spacing: 0.4px;
      white-space: nowrap;
    }
    .total-cost span {
      font-weight: 500;
      color: #fff;
    }

    .category-section {
      margin-bottom: 40px;
    }
    .category-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-left: 4px;
    }
    .category-title {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--t3);
      font-weight: 400;
    }
    .category-badge {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--optional-badge);
      background: rgba(139, 126, 106, 0.1);
      border: 1px solid rgba(139, 126, 106, 0.2);
      padding: 2px 8px;
      border-radius: 4px;
    }
    .setup-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .item-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      overflow: hidden;
      backdrop-filter: blur(12px);
      transition: border-color 0.25s ease, box-shadow 0.25s ease, opacity 0.4s var(--ease);
      display: flex;
      flex-direction: column;
      animation: cardAppear 0.5s var(--ease) forwards;
      opacity: 0;
      transform: translateY(16px);
    }
    .item-card.optional-item {
      border-left: 2px solid rgba(139, 126, 106, 0.3);
    }
    .item-card.optional-dimmed {
      opacity: 0.45;
    }
    .item-card:hover {
      border-color: rgba(255,255,255,0.18);
      box-shadow: 0 8px 28px rgba(0,0,0,0.5);
    }
    @keyframes cardAppear {
      to { opacity: 1; transform: translateY(0); }
    }

    .card-main {
      display: flex;
      flex-direction: row;
      align-items: stretch;
      gap: 0;
    }

    .card-image {
      width: 260px;
      flex-shrink: 0;
      background: #0f1218;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      border-right: 1px solid rgba(255,255,255,0.05);
      position: relative;
    }
    .card-image img {
      max-width: 100%;
      max-height: 200px;
      object-fit: contain;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.6));
      transition: transform 0.3s ease;
    }
    .item-card:hover .card-image img {
      transform: scale(1.03);
    }

    .card-content {
      flex: 1;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .item-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 6px;
    }
    .item-title-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .item-title {
      font-size: 19px;
      font-weight: 500;
      color: var(--t1);
      letter-spacing: 0.2px;
      line-height: 1.3;
    }
    .item-optional-tag {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--optional-badge);
      background: rgba(139, 126, 106, 0.12);
      border: 1px solid rgba(139, 126, 106, 0.2);
      padding: 2px 8px;
      border-radius: 4px;
      white-space: nowrap;
    }
    .item-pricing {
      display: flex;
      align-items: center;
      gap: 12px;
      white-space: nowrap;
    }
    .item-unit-price {
      font-size: 13px;
      color: var(--t3);
      letter-spacing: 0.3px;
    }
    .item-qty {
      font-size: 13px;
      color: var(--t3);
      letter-spacing: 0.3px;
      background: rgba(255,255,255,0.04);
      padding: 3px 10px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .item-total-price {
      font-size: 19px;
      font-weight: 500;
      color: #e0e6f0;
      background: rgba(255,255,255,0.04);
      padding: 4px 14px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.08);
      letter-spacing: 0.3px;
      min-width: 95px;
      text-align: right;
    }
    .item-meta {
      font-size: 13px;
      color: var(--t3);
      letter-spacing: 0.3px;
      margin-bottom: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .item-meta span {
      background: rgba(255,255,255,0.04);
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 12px;
      border: 1px solid rgba(255,255,255,0.07);
    }
    .item-desc {
      font-size: 14px;
      line-height: 1.6;
      color: var(--t2);
      letter-spacing: 0.15px;
      margin-bottom: 18px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .item-actions {
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--t2);
      text-decoration: none;
      letter-spacing: 0.3px;
      transition: all 0.25s ease;
      cursor: pointer;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 8px 18px;
      border-radius: 6px;
    }
    .btn:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.25);
      color: #fff;
    }
    .btn-details {
      background: transparent;
      border: none;
      padding: 8px 4px;
      color: var(--t3);
      font-size: 13px;
      cursor: pointer;
      transition: color 0.25s;
      font-family: var(--mono);
      letter-spacing: 0.3px;
    }
    .btn-details:hover {
      color: #fff;
    }

    .card-details {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.5s var(--ease), padding 0.3s ease;
      background: rgba(0,0,0,0.25);
      border-top: 1px solid transparent;
      padding: 0 28px;
    }
    .item-card.expanded .card-details {
      max-height: 2000px;
      border-top-color: rgba(255,255,255,0.06);
      padding: 24px 28px;
    }
    .details-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 14px 24px;
      font-size: 13px;
      color: var(--t2);
    }
    .detail-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .detail-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--t3);
    }
    .detail-value {
      color: #e0e4ec;
      font-weight: 500;
    }
    .full-description {
      margin-top: 20px;
      font-size: 14px;
      line-height: 1.7;
      color: #cbd0db;
      white-space: pre-wrap;
      border-top: 1px solid rgba(255,255,255,0.06);
      padding-top: 18px;
    }

    @media (max-width: 750px) {
      .card-main {
        flex-direction: column;
      }
      .card-image {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        padding: 20px;
        max-height: 220px;
      }
      .card-image img {
        max-height: 160px;
      }
      .card-content {
        padding: 20px;
      }
      .item-header {
        flex-direction: column;
        gap: 8px;
      }
      .item-pricing {
        flex-wrap: wrap;
      }
      .page {
        padding: 100px 16px 30px;
      }
      .page-subtitle {
        flex-direction: column;
        align-items: flex-start;
      }
      .total-section {
        margin-left: 0;
      }
    }
  </style>
</head>

    function formatPrice(price) {
      return '€' + price.toFixed(2).replace('.', ',');
    }

    function buildItemCard(item, index) {
      const totalPrice = item.price * item.qty;
      const optionalClass = item.optional ? ' optional-item' : '';
      const optionalTag = item.optional ? '<div class="item-optional-tag">optioneel</div>' : '';
      const titleRow = item.optional
        ? '<div class="item-title-row"><div class="item-title">' + item.title + '</div>' + optionalTag + '</div>'
        : '<div class="item-title">' + item.title + '</div>';

      const metaHTML = item.metaTags.map(function(t) { return '<span>' + t + '</span>'; }).join('');
      const detailsHTML = item.details.map(function(d) {
        return '<div class="detail-item"><span class="detail-label">' + d[0] + '</span><span class="detail-value">' + d[1] + '</span></div>';
      }).join('');

      return '<div class="item-card' + optionalClass + '" id="' + item.id + '" data-optional="' + item.optional + '" data-price="' + item.price + '" data-qty="' + item.qty + '" style="animation-delay:' + (index * 0.08) + 's">' +
        '<div class="card-main">' +
          '<div class="card-image">' +
            '<img src="' + item.image + '" alt="' + item.title + '" loading="lazy">' +
          '</div>' +
          '<div class="card-content">' +
            '<div class="item-header">' +
              titleRow +
              '<div class="item-pricing">' +
                '<span class="item-qty">' + item.qty + '×</span>' +
                '<span class="item-unit-price">' + formatPrice(item.price) + '</span>' +
                '<span class="item-total-price">' + formatPrice(totalPrice) + '</span>' +
              '</div>' +
            '</div>' +
            '<div class="item-meta">' + metaHTML + '</div>' +
            '<div class="item-desc">' + item.shortDesc + '</div>' +
            '<div class="item-actions">' +
              '<a href="' + item.url + '" target="_blank" rel="noopener" class="btn">Bekijk op Shogun</a>' +
              '<button class="btn-details" onclick="toggleCard(\'' + item.id + '\')">Meer details</button>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="card-details">' +
          '<div class="details-grid">' + detailsHTML + '</div>' +
          '<div class="full-description">' + item.fullDesc + '</div>' +
        '</div>' +
      '</div>';
    }

    function buildCategorySection(category, items, startIndex) {
      var html = '<div class="category-section"><div class="category-header"><div class="category-title">' + category + '</div></div><div class="setup-list">';
      for (var i = 0; i < items.length; i++) {
        html += buildItemCard(items[i], startIndex + i);
      }
      html += '</div></div>';
      return html;
    }

    function renderAllCategories() {
      var categories = {};
      for (var i = 0; i < ITEMS.length; i++) {
        var cat = ITEMS[i].category;
        if (!categories[cat]) categories[cat] = [];
        categories[cat].push(ITEMS[i]);
      }
      var catOrder = ['Primary Weapon', 'Magazines & Accessories', 'Attachments', 'Gear'];
      var html = '';
      var index = 0;
      for (var c = 0; c < catOrder.length; c++) {
        var catName = catOrder[c];
        if (categories[catName]) {
          html += buildCategorySection(catName, categories[catName], index);
          index += categories[catName].length;
        }
      }
      document.getElementById('categoriesContainer').innerHTML = html;
    }

    function calculateGrandTotal(includeOptional) {
      var grandTotal = 0;
      for (var i = 0; i < ITEMS.length; i++) {
        var item = ITEMS[i];
        if (item.optional && !includeOptional) continue;
        grandTotal += item.price * item.qty;
      }
      document.getElementById('totalPrice').textContent = formatPrice(grandTotal);
    }

    window.toggleOptional = function() {
      var checkbox = document.getElementById('optionalCheckbox');
      var includeOptional = checkbox.checked;
      var optionalCards = document.querySelectorAll('.item-card[data-optional="true"]');
      for (var i = 0; i < optionalCards.length; i++) {
        if (includeOptional) {
          optionalCards[i].classList.remove('optional-dimmed');
        } else {
          optionalCards[i].classList.add('optional-dimmed');
        }
      }
      calculateGrandTotal(includeOptional);
    };

    window.toggleCard = function(id) {
      var card = document.getElementById(id);
      if (card) card.classList.toggle('expanded');
    };

    renderAllCategories();
    calculateGrandTotal(false);

    (function() {
      var g = document.getElementById('bgtext');
      if (g) {
        function r() {
          g.innerHTML = '';
          var w = window.innerWidth;
          var c = 16, ro = 20;
          if (w < 768) { c = 10; ro = 15; }
          else if (w > 1600) { c = 20; ro = 24; }
          g.style.gridTemplateColumns = 'repeat(' + c + ', 1fr)';
          g.style.gridTemplateRows = 'repeat(' + ro + ', 1fr)';
          for (var i = 0; i < c * ro; i++) {
            var d = document.createElement('div');
            d.textContent = 'gekke.org';
            g.appendChild(d);
          }
        }
        r();
        window.addEventListener('resize', function() { setTimeout(r, 100); });
      }

      var logo = document.getElementById('topbarLogo');
      if (logo) {
        logo.onerror = function() { logo.style.display = 'none'; };
        if (logo.complete && logo.naturalWidth === 0) logo.style.display = 'none';
      }
    })();
  </script>
